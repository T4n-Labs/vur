name: Generate VUR Index

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x vtools/*.sh

      - name: Generate index
        run: ./vtools/generate.sh

      - name: Commit index
        run: |
          git config user.name "VUR Bot"
          git config user.email "bot@vur"
          git add index.json
          git diff --quiet || git commit -m "update index"
          git push
